<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BRCSGO — Painel de Partidas</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 95,27 95,73 50,95 5,73 5,27' fill='%23FF7A29'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --black:#05060C;
    --black-2:#080A14;
    --panel:#0F1122;
    --panel2:#151832;
    --panel3:#1E2143;
    --line: rgba(180,170,255,0.08);
    --line-strong: rgba(180,170,255,0.18);
    --white:#F3F1FA;
    --muted:#9096B8;
    --muted-2:#5A5F82;
    --orange:#FF7A29;
    --orange-2:#FFB27A;
    --orange-soft: rgba(255,122,41,0.14);
    --blue:#5AA9FF;
    --blue-deep:#2A4CFF;
    --blue-soft: rgba(90,169,255,0.14);
    --purple:#8B5CF6;
    --purple-2:#B48CFF;
    --purple-soft: rgba(139,92,246,0.16);
    --red:#EB4B6B;
    --red-soft: rgba(235,75,107,0.14);
    --grad-orange: linear-gradient(135deg,#FF9147 0%,#FF5B1F 55%,#E23F8E 100%);
    --grad-cosmic: linear-gradient(135deg,#5AA9FF 0%,#8B5CF6 55%,#FF7A29 120%);
    --grad-panel: linear-gradient(180deg, rgba(180,140,255,0.06), rgba(255,255,255,0) 60%);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
    --shadow-md: 0 10px 30px -12px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    --shadow-glow: 0 0 0 1px rgba(255,122,41,0.35), 0 12px 44px -12px rgba(255,122,41,0.4);
  }
  *{box-sizing:border-box;}
  html,body{ min-height:100%; }
  body{
    margin:0;
    color: var(--white);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    background:
      radial-gradient(1100px 700px at 88% -12%, rgba(255,122,41,0.16), transparent 60%),
      radial-gradient(1000px 700px at -10% 15%, rgba(90,169,255,0.16), transparent 60%),
      radial-gradient(900px 800px at 50% 110%, rgba(139,92,246,0.22), transparent 60%),
      radial-gradient(600px 500px at 20% 80%, rgba(226,63,142,0.10), transparent 60%),
      linear-gradient(180deg, #070818 0%, #05060C 60%, #06081A 100%);
    background-attachment: fixed;
    position:relative;
    overflow-x:hidden;
  }
  /* Grid + noise + aurora layers */
  body::before{
    content:""; position:fixed; inset:-2px; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(180,170,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,170,255,0.045) 1px, transparent 1px);
    background-size: 56px 56px, 56px 56px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 40%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 40%, transparent 90%);
    opacity:.55;
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      conic-gradient(from 210deg at 70% 30%, rgba(255,122,41,0.22), transparent 25%, rgba(139,92,246,0.22) 55%, transparent 80%, rgba(90,169,255,0.20) 100%);
    filter: blur(90px) saturate(1.1);
    opacity:.55;
    animation: auroraShift 22s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes auroraShift{
    0%  { transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1);   }
    50% { transform: translate3d(3%, 2%, 0)  rotate(15deg) scale(1.1); }
    100%{ transform: translate3d(-1%, 3%, 0) rotate(-10deg) scale(1.05);}
  }

  h1,h2,h3, .display{
    font-family:'Rajdhani', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin:0;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  ::selection{ background: var(--orange); color:#0A0A0C; }

  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes popIn{ from{opacity:0; transform:scale(.7);} to{opacity:1; transform:scale(1);} }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 0 0 rgba(255,122,41,0.25), 0 0 0 rgba(139,92,246,0);} 50%{ box-shadow:0 0 26px rgba(255,122,41,0.6), 0 0 46px rgba(139,92,246,0.35);} }
  @keyframes pillPulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.14);} }
  @keyframes slideUp{ from{opacity:0; transform:translate(-50%,14px);} to{opacity:1; transform:translate(-50%,0);} }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes shimmer{ 0%{ background-position:-200% 0;} 100%{ background-position:200% 0;} }
  @keyframes borderGlow{ 0%,100%{ background-position:0% 50%;} 50%{ background-position:100% 50%;} }
  @keyframes floaty{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-4px);} }

  .app{ position:relative; z-index:1; max-width:1220px; margin:0 auto; padding:32px 22px 90px; }

  .storage-warning{
    background: linear-gradient(180deg, rgba(235,75,107,0.20), rgba(235,75,107,0.06));
    border:1px solid rgba(235,75,107,0.45);
    color:var(--white);
    padding:14px 18px; font-size:13px; margin-bottom:18px; line-height:1.55;
    border-radius:12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px -18px rgba(235,75,107,0.6);
  }

  .header{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
    padding:24px 26px;
    background:
      radial-gradient(500px 200px at 90% -30%, rgba(255,122,41,0.18), transparent 60%),
      radial-gradient(500px 220px at 0% 130%, rgba(139,92,246,0.22), transparent 60%),
      linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
      var(--panel);
    border:1px solid var(--line);
    margin-bottom:22px;
    border-radius:18px;
    box-shadow: var(--shadow-md), 0 0 60px -30px rgba(139,92,246,0.5);
    position:relative; overflow:hidden;
    backdrop-filter: blur(14px);
  }
  .header::before{
    content:""; position:absolute; left:0; right:0; top:0; height:1px;
    background: linear-gradient(90deg, transparent, rgba(90,169,255,0.5), rgba(139,92,246,0.6), rgba(255,122,41,0.6), transparent);
    background-size: 200% 100%;
    animation: borderGlow 8s linear infinite;
  }
  .header::after{
    content:""; position:absolute; inset:-1px; border-radius:18px; pointer-events:none;
    background: linear-gradient(140deg, rgba(90,169,255,0.14), transparent 30%, transparent 70%, rgba(255,122,41,0.14));
    mix-blend-mode: overlay;
  }
  .brand{ display:flex; align-items:center; gap:16px; position:relative; z-index:1; }
  .brand-mark{
    width:48px; height:48px;
    background: var(--grad-orange);
    clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
    flex-shrink:0;
    animation: pulseGlow 3s ease-in-out infinite, floaty 5s ease-in-out infinite;
    filter: drop-shadow(0 8px 18px rgba(255,122,41,0.45));
  }
  .brand h1{
    font-size:26px;
    background: linear-gradient(90deg, #FFFFFF 0%, #C7B8FF 55%, #FFB27A 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand p{ margin:4px 0 0; font-size:11.5px; color:var(--muted); letter-spacing:0.18em; text-transform:uppercase; }

  .header-controls{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; position:relative; z-index:1; }
  select, input, button{
    font-family:'Inter', sans-serif;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)) , var(--panel2);
    color: var(--white);
    border:1px solid var(--line);
    padding:10px 14px;
    font-size:14px;
    border-radius:10px;
    transition: border-color .2s ease, background .2s ease, transform .12s ease, box-shadow .2s ease;
  }
  select{ min-width:150px; appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--purple-2) 50%), linear-gradient(135deg, var(--purple-2) 50%, transparent 50%), linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)), var(--panel2);
    background-position: calc(100% - 16px) 55%, calc(100% - 11px) 55%, 0 0, 0 0;
    background-size: 5px 5px, 5px 5px, 100% 100%, 100% 100%; background-repeat:no-repeat; padding-right:34px;
  }
  input:hover, select:hover{ border-color: var(--line-strong); }
  input:focus, select:focus{ outline:none; border-color: var(--purple-2); box-shadow: 0 0 0 3px rgba(139,92,246,0.22); }
  button{
    cursor:pointer;
    background: var(--grad-orange);
    color:#0A0A0C;
    font-weight:700;
    border:none;
    text-transform:uppercase;
    letter-spacing:0.05em;
    font-size:13px;
    border-radius:10px;
    box-shadow: 0 6px 18px -6px rgba(255,122,41,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  button:hover:not(:disabled){ transform: translateY(-1px); filter:brightness(1.07); box-shadow: 0 10px 26px -8px rgba(255,122,41,0.8), inset 0 1px 0 rgba(255,255,255,0.35); }
  button:active:not(:disabled){ transform: translateY(0); filter:brightness(0.98); }
  button:disabled{ opacity:0.5; cursor:wait; box-shadow:none; }
  button:focus-visible{ outline:2px solid var(--purple-2); outline-offset:2px; }
  button.secondary{
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0)), var(--panel2);
    color: var(--white); border:1px solid var(--line-strong);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }
  button.secondary:hover:not(:disabled){ background: linear-gradient(180deg, rgba(139,92,246,0.14), rgba(255,255,255,0)), var(--panel3); border-color: rgba(139,92,246,0.4); }
  button.danger{ background: linear-gradient(135deg,#EB4B6B,#B92E52); color:#fff; box-shadow: 0 6px 18px -6px rgba(235,75,107,0.65), inset 0 1px 0 rgba(255,255,255,0.2); }
  button.ok{ background: linear-gradient(135deg,#5AA9FF,#2A4CFF); color:#fff; box-shadow: 0 6px 18px -6px rgba(90,169,255,0.65), inset 0 1px 0 rgba(255,255,255,0.2); }
  button.small{ padding:7px 12px; font-size:11px; border-radius:8px; }

  .mode-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .mode-chip{
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)), var(--panel);
    color:var(--muted); border:1px solid var(--line);
    padding:9px 16px; font-size:12px; font-family:'Rajdhani',sans-serif; font-weight:600;
    text-transform:uppercase; letter-spacing:0.07em; cursor:pointer;
    border-radius:999px;
    transition: color .2s ease, background .2s ease, border-color .2s ease, transform .15s ease, box-shadow .2s ease;
    backdrop-filter: blur(6px);
  }
  .mode-chip:hover{ color:var(--white); border-color: rgba(139,92,246,0.4); box-shadow: 0 0 0 3px rgba(139,92,246,0.10); }
  .mode-chip.active{
    background: var(--grad-orange); color:#0A0A0C; border-color:transparent;
    box-shadow: 0 6px 20px -6px rgba(255,122,41,0.7), 0 0 0 3px rgba(255,122,41,0.15);
  }

  .tabs{
    display:flex; gap:4px; margin-bottom:22px; flex-wrap:wrap;
    padding:6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)), var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow: var(--shadow-md);
    backdrop-filter: blur(10px);
    position:relative; overflow:hidden;
  }
  .tabs::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(90deg, transparent, rgba(139,92,246,0.06), transparent);
  }
  .tab-btn{
    position:relative;
    display:flex; align-items:center; gap:8px;
    background: transparent;
    color: var(--muted);
    border:1px solid transparent;
    padding:11px 18px;
    font-family:'Rajdhani', sans-serif;
    font-weight:600;
    letter-spacing:0.07em;
    text-transform:uppercase;
    font-size:13.5px;
    border-radius:10px;
    box-shadow:none;
    transition: color .2s ease, background .2s ease, border-color .2s ease, transform .12s ease;
  }
  .tab-btn::after{ display:none; }
  .tab-btn:hover{ color: var(--white); background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.18); }
  .tab-btn svg{ width:15px; height:15px; opacity:0.75; }
  .tab-btn.active{
    color: #fff;
    background: linear-gradient(135deg, rgba(255,122,41,0.22), rgba(139,92,246,0.28));
    border-color: rgba(255,122,41,0.45);
    box-shadow: 0 6px 20px -8px rgba(255,122,41,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .tab-btn.active svg{ opacity:1; color: var(--orange-2); }
  .tab-btn .pill{ background:var(--red); color:#fff; font-size:10px; padding:2px 7px; border-radius:9px; font-family:'Inter'; margin-left:2px; animation: pillPulse 1.6s ease-in-out infinite; box-shadow: 0 0 12px rgba(235,75,107,0.6); }

  .panel{
    position:relative;
    background:
      radial-gradient(600px 300px at 100% 0%, rgba(139,92,246,0.10), transparent 55%),
      radial-gradient(500px 260px at 0% 100%, rgba(90,169,255,0.08), transparent 55%),
      var(--grad-panel),
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
      var(--panel);
    border:1px solid var(--line);
    padding:26px;
    margin-bottom:20px;
    border-radius:18px;
    box-shadow: var(--shadow-md), 0 0 40px -30px rgba(139,92,246,0.6);
    animation: fadeIn .4s ease;
    backdrop-filter: blur(12px);
    overflow:hidden;
  }
  .panel::before{
    content:""; position:absolute; left:0; right:0; top:0; height:2px; border-radius:18px 18px 0 0;
    background: linear-gradient(90deg, transparent, var(--orange), var(--purple), transparent);
    background-size: 200% 100%;
    animation: borderGlow 6s linear infinite;
  }
  .panel::after{
    content:""; position:absolute; inset:0; border-radius:18px; pointer-events:none;
    background: radial-gradient(700px 260px at 50% -20%, rgba(255,122,41,0.10), transparent 60%);
  }
  .panel > *{ position:relative; z-index:1; }
  .panel.accent-blue::before{ background: linear-gradient(90deg, transparent, var(--blue), var(--purple), transparent); background-size:200% 100%; }
  .panel.accent-blue::after{ background: radial-gradient(700px 260px at 50% -20%, rgba(90,169,255,0.12), transparent 60%); }
  .panel.accent-red::before{ background: linear-gradient(90deg, transparent, var(--red), #b92e52, transparent); background-size:200% 100%; }
  .panel.accent-red::after{ background: radial-gradient(700px 260px at 50% -20%, rgba(235,75,107,0.12), transparent 60%); }
  .panel.accent-muted::before{ background: linear-gradient(90deg, transparent, var(--line-strong), transparent); }
  .panel.accent-muted::after{ background:none; }
  .panel h2{
    font-size:20px; color:var(--white); margin-bottom:18px;
    display:flex; align-items:center; gap:10px;
  }
  .panel h2 .sub{ color:var(--muted); font-size:12px; text-transform:none; letter-spacing:0; margin-left:8px; font-family:'Inter',sans-serif; font-weight:400; }

  .hero-stats{
    display:grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
    gap:1px; margin-bottom:22px;
    background: linear-gradient(135deg, rgba(139,92,246,0.28), rgba(90,169,255,0.28), rgba(255,122,41,0.28));
    border-radius:14px; overflow:hidden;
    border:1px solid var(--line);
    box-shadow: 0 12px 40px -22px rgba(0,0,0,0.7);
  }
  .hero-card{
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    padding:20px; animation: fadeIn .4s ease both;
    transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
    position:relative;
  }
  .hero-card::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:0;
    background: radial-gradient(200px 120px at 50% 0%, rgba(255,122,41,0.18), transparent 70%);
    transition: opacity .3s ease;
  }
  .hero-card:hover{ background: linear-gradient(180deg, var(--panel3), var(--panel2)); transform: translateY(-2px); }
  .hero-card:hover::before{ opacity:1; }
  .hero-card:nth-child(1){ animation-delay:.02s; } .hero-card:nth-child(2){ animation-delay:.08s; }
  .hero-card:nth-child(3){ animation-delay:.14s; } .hero-card:nth-child(4){ animation-delay:.2s; }
  .hero-card .val{ font-family:'IBM Plex Mono',monospace; font-size:28px; font-weight:600; position:relative;
    background: linear-gradient(180deg,#FFD5B0 0%, #FF9147 45%, #B48CFF 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 30px rgba(255,122,41,0.25);
  }
  .hero-card .lbl{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.11em; margin-top:6px; position:relative; }

  .grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:14px; }
  .field label{ display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.11em; margin-bottom:7px; }
  .field select, .field input{ width:100%; }
  .empty-note{ color:var(--muted); font-size:13px; padding:8px 0; }
  .helper-note{
    color:var(--muted); font-size:12.5px; line-height:1.6; margin-top:18px;
    padding:14px 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)), var(--panel2);
    border-left:3px solid var(--orange);
    border-radius:0 12px 12px 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .helper-note.blue{ border-left-color: var(--blue); }

  .rank-row{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .badge{
    width:74px; height:74px;
    clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Rajdhani', sans-serif; font-weight:700; font-size:22px;
    color:#0A0A0C; flex-shrink:0;
    animation: popIn .4s cubic-bezier(.2,1.4,.4,1);
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.55)) drop-shadow(0 0 14px rgba(139,92,246,0.35));
  }
  .rank-info .rank-name{ font-size:24px; background: linear-gradient(90deg,#fff,#C7B8FF); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .rank-info .elo{ color:var(--muted); font-size:13px; margin-top:4px; letter-spacing:0.02em; }
  .progress-bar{
    height:10px; background:var(--panel2); margin-top:14px; width:100%; max-width:360px;
    overflow:hidden; border-radius:999px; border:1px solid var(--line); position:relative;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
  }
  .progress-fill{
    height:100%; width:0;
    background: linear-gradient(90deg, #5AA9FF, #8B5CF6, #FF7A29);
    background-size: 200% 100%;
    transition: width 1s cubic-bezier(.2,.7,.2,1);
    border-radius:999px;
    box-shadow: 0 0 16px rgba(255,122,41,0.55), 0 0 24px rgba(139,92,246,0.35);
    position:relative; overflow:hidden;
    animation: borderGlow 5s linear infinite;
  }
  .progress-fill::after{ content:""; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    background-size: 200% 100%; animation: shimmer 2.4s linear infinite;
  }
  .progress-label{ font-size:11px; color:var(--muted); margin-top:8px; letter-spacing:0.05em; text-transform:uppercase; }

  .calib-dots{ display:flex; gap:8px; margin-top:12px; }
  .calib-dot{
    width:18px; height:18px; border-radius:50%;
    background:var(--panel2); border:1px solid var(--line);
    transition: background .3s ease, transform .3s ease, box-shadow .3s ease;
  }
  .calib-dot.filled{
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-color: var(--purple-2);
    transform: scale(1.14);
    box-shadow: 0 0 12px rgba(90,169,255,0.6), 0 0 20px rgba(139,92,246,0.4);
  }

  .stat-cards{
    display:grid; grid-template-columns: repeat(auto-fit,minmax(130px,1fr));
    gap:1px; margin-top:22px;
    background: linear-gradient(135deg, rgba(139,92,246,0.22), rgba(90,169,255,0.22), rgba(255,122,41,0.22));
    border-radius:12px; overflow:hidden; border:1px solid var(--line);
  }
  .stat-card{
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    padding:16px; text-align:center; animation: fadeIn .3s ease both;
    transition: transform .2s ease, background .2s ease;
  }
  .stat-card:hover{ transform: translateY(-2px); background: linear-gradient(180deg, var(--panel3), var(--panel2)); }
  .stat-card .val{
    font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600;
    background: linear-gradient(180deg,#fff,#B48CFF);

function getTier(elo){
  let idx = 0;
  for(let i=0;i<TIERS.length;i++){ if(elo >= TIERS[i].min) idx = i; }
  return {...TIERS[idx], index: idx};
}

function computeEloDelta(m){
  if(m.mode === '1v5'){
    // No 1v5, é normal ter muitos kills contra 5 bots sozinho — o que difere skill de sorte
    // é sobreviver (poucas mortes) e, principalmente, VENCER. Kills contam pouco aqui de propósito.
    const perf = ((m.pontos||0)*0.3) + ((m.mvps||0)*2) - (m.deaths*2.0) + ((m.assists||0)*0.3);
    let base = m.result === 'vitoria' ? 35 : (m.result === 'empate' ? 5 : -8);
    let delta = Math.round(base + (perf*0.4));
    return Math.max(-25, Math.min(50, delta));
  }
  const perf = ((m.pontos||0)*0.5) + ((m.mvps||0)*3) - (m.deaths*1.0) + ((m.assists||0)*0.3);
  let base = m.result === 'vitoria' ? 18 : (m.result === 'empate' ? 2 : -14);
  let perfAdj = (perf - 18) * 0.6;
  let delta = Math.round(base + perfAdj);
  return Math.max(-40, Math.min(45, delta));
}

function flagsFor(m){
  const flags = [];
  if(m.mode === '1v5'){
    if(m.deaths > 16) flags.push('Mais mortes do que rodadas possíveis numa partida');
    if((m.mvps||0) > 16) flags.push('MVPs muito acima do normal');
    if((m.pontos||0) > 0 && m.pontos < m.kills) flags.push('Pontuação incoerente com os kills informados');
    return flags;
  }
  const kd = m.deaths > 0 ? m.kills/m.deaths : m.kills;
  if(m.kills > 40) flags.push('Kills muito acima do normal');
  if(kd > 6) flags.push('K/D extremo');
  if(m.deaths === 0 && m.kills > 15) flags.push('Zero mortes com muitos kills');
  if((m.mvps||0) > 16) flags.push('MVPs muito acima do normal');
  if((m.pontos||0) > 0 && m.pontos < m.kills) flags.push('Pontuação incoerente com os kills informados');
  return flags;
}

function computePlacementElo(first10, mode){
  const n = first10.length;
  if(n === 0) return 0;
  const avg = key => first10.reduce((s,m) => s + (m[key]||0), 0) / n;
  const avgPontos = avg('pontos');
  const avgMvps = avg('mvps');
  const avgDeaths = avg('deaths');
  const avgAssists = avg('assists');
  const wins = first10.filter(m => m.result === 'vitoria').length;
  const winRate = wins / n;

  let skill;
  if(mode === '1v5'){
    // No 1v5, ganhar é raríssimo mesmo pra quem é muito bom — o desempenho individual
    // (pontos, MVPs, sobrevivência) precisa pesar muito mais que o resultado da partida.
    skill = (avgPontos*6) + (avgMvps*55) - (avgDeaths*10) + (avgAssists*10) + (winRate*450);
  } else {
    skill = (avgPontos*5) + (avgMvps*45) - (avgDeaths*12) + (avgAssists*8) + (winRate*550);
  }
  return Math.max(0, Math.round(skill));
}

function computeModeStats(playerId, mode){
  const cfg = MODES[mode];
  const pm = matches.filter(m => m.playerId === playerId && m.status === 'aprovada' && (m.mode || 'competitivo') === mode)
    .sort((a,b) => a.createdAt - b.createdAt);
  const total = pm.length;
  const kills = pm.reduce((s,m) => s + m.kills, 0);
  const deaths = pm.reduce((s,m) => s + m.deaths, 0);
  const assists = pm.reduce((s,m) => s + (m.assists||0), 0);
  const pontos = pm.reduce((s,m) => s + (m.pontos||0), 0);
  const mvps = pm.reduce((s,m) => s + (m.mvps||0), 0);
  const wins = pm.filter(m => m.result === 'vitoria').length;
  const losses = pm.filter(m => m.result === 'derrota').length;
  const winRate = total > 0 ? (wins/total*100) : 0;
  const kd = deaths > 0 ? (kills/deaths) : kills;

  let elo = 0, historyMap = {};
  if(cfg.hasPatente && total >= 10){
    const first10 = pm.slice(0, 10);
    const placementElo = computePlacementElo(first10, mode);
    const hist = [];
    first10.forEach((m, i) => {
      // as 10 partidas de calibragem, juntas, definem a colocação — não sobem uma a uma
      hist.push({...m, eloBefore: i === 0 ? 0 : placementElo, eloAfter: placementElo, eloDelta: i === 9 ? placementElo : 0, isPlacement: true});
    });
    let e = placementElo;
    pm.slice(10).forEach(m => {
      const delta = computeEloDelta(m);
      const before = e; e = Math.max(0, e + delta);
      hist.push({...m, eloBefore: before, eloAfter: e, eloDelta: delta, isPlacement: false});
    });
    elo = e;
    historyMap = Object.fromEntries(hist.map(h => [h.id, h]));
  }
  return {
    playerId, mode, total, kills, deaths, assists, pontos, mvps, wins, losses, winRate, kd,
    elo, calibrating: cfg.hasPatente && total < 10, historyMap
  };
}

function getModeRanking(mode){
  const cfg = MODES[mode];
  if(!cfg.rankBy) return [];
  return players.map(p => ({p, s: computeModeStats(p.id, mode)}))
    .filter(r => r.s.total > 0)
    .sort((a,b) => {
      if(cfg.rankBy === 'elo') return b.s.elo - a.s.elo;
      if(cfg.rankBy === 'winRate') return b.s.winRate - a.s.winRate;
      if(cfg.rankBy === 'kills') return b.s.kills - a.s.kills;
      return 0;
    });
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 960;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.88));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function extractJSON(text){
  try{ return JSON.parse(text); }catch(e){}
  const m = text.match(/\{[\s\S]*\}/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  return null;
}

function normalizeText(s){
  return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}
function normalizeResultado(s){
  const n = normalizeText(s);
  if(n.includes('vitor')) return 'vitoria';
  if(n.includes('derrot')) return 'derrota';
  if(n.includes('empat')) return 'empate';
  return null;
}
function matchMap(s){
  const n = normalizeText(s);
  if(!n) return null;
  return MAPS.find(m => { const nm = normalizeText(m); return nm === n || n.includes(nm) || nm.includes(n); }) || null;
}
function matchMode(s){
  const n = normalizeText(s);
  if(!n) return null;
  for(const k of MODE_KEYS){
    const nl = normalizeText(MODES[k].label);
    if(nl === n || n.includes(nl)) return k;
  }
  return null;
}

async function analyzeProof(dataUrl, playerName, modeKey){
  if(AI_PROXY_URL === "https://brcsgoia.ttyfit518.workers.dev/") return null;
  try{
    const base64 = dataUrl.split(',')[1];
    const hasMvps = MODES[modeKey].fields.includes('mvps');
    const prompt = 'Você está analisando um print de tela de fim de partida do jogo Counter-Strike, jogado OFFLINE contra bots. O layout típico é este: '
      + 'um texto GRANDE no topo/centro da tela dizendo "VITÓRIA", "DERROTA" ou "EMPATE" — pode ter o nome de um time logo abaixo dessa palavra grande, IGNORE esse nome de time, considere só a palavra grande em si. '
      + 'No canto superior esquerdo aparece o modo de jogo e o mapa juntos, separados por uma barra "|", no formato "MODO | MAPA" (ex: "COMPETITIVO | TRAIN"). '
      + 'Na lista de jogadores, cada linha tem (da esquerda pra direita): nível/ranking, ícone, nome do jogador, e depois colunas: "V" (vítimas = kills/abates), "A" (assistências), "M" (mortes/deaths), um ícone de estrela com um número ao lado (quantidade de MVPs) e por fim "PONTOS" (pontuação da partida). '
      + 'Jogadores controlados por bot aparecem com o prefixo "BOT" antes do nome — o jogador humano é o único nome sem esse prefixo. '
      + 'O nome do jogador humano pode vir precedido de uma tag de clã/time (ex: "KGN NOTZ", onde "KGN" é a tag do clã e "NOTZ" é o nome de fato) — IGNORE a tag de clã, o que importa é o restante do nome, que deve se parecer com "' + playerName + '". '
      + 'Extraia da linha do jogador humano: kills (coluna "V"), assists (coluna "A"), deaths (coluna "M")'
      + (hasMvps ? ', mvps (número ao lado do ícone de estrela)' : ' (mvps: este modo não tem estrelas MVP, retorne null)')
      + ', e pontos (coluna "PONTOS"). Extraia também: resultado (a palavra grande do topo: "vitoria", "derrota" ou "empate"), modo (texto antes da barra "|" no canto superior esquerdo), e mapa (texto depois da barra "|"). '
      + 'Responda ESTRITAMENTE em JSON válido, sem markdown, sem texto antes ou depois, neste formato exato: '
      + '{"legivel": true ou false, "resultado": "vitoria"/"derrota"/"empate"/null, "modo": "texto ou null", "mapa": "texto ou null", "kills": numero ou null, "deaths": numero ou null, "assists": numero ou null, "pontos": numero ou null, "mvps": numero ou null, "observacao": "breve nota em portugues"}. '
      + 'Só retorne "legivel": false se a imagem estiver realmente ilegível, cortada demais, ou não for um placar de CS.';

    const response = await fetch(AI_PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: base64, prompt })
    });
    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('').trim();
    return extractJSON(text);
  }catch(e){
    console.error('Erro na análise de IA', e);
    return null;
  }
}

function findOrCreatePlayer(name){
  const clean = name.trim();
  let p = players.find(p => p.name.toLowerCase() === clean.toLowerCase());
  if(!p){
    p = {id: 'p_' + Date.now() + '_' + Math.floor(Math.random()*1000), name: clean};
    players.push(p);
  }
  return p;
}

function showToast(msg){
  let t = document.getElementById('toast');
  if(t) t.remove();
  t = document.createElement('div');
  t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 3600);
}

function starString(n){
  const shown = Math.min(n, 10);
  return '★'.repeat(shown) + (n > 10 ? ' +' + (n-10) : '');
}

function playerOptionsHTML(selectedId){
  const sorted = players.slice().sort((a,b) => a.name.localeCompare(b.name));
  return sorted.map(p => `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.name}</option>`).join('');
}

function modeOptionsHTML(selected){
  return MODE_KEYS.map(k => `<option value="${k}" ${k===selected?'selected':''}>${MODES[k].label}</option>`).join('');
}

const TIER_FAMILIES = [
  {upto:5,  shape:'circle'},
  {upto:9,  shape:'square'},
  {upto:13, shape:'pentagon'},
  {upto:15, shape:'diamond'},
  {upto:17, shape:'star'}
];
function tierFamilyOf(index){
  for(const f of TIER_FAMILIES){ if(index <= f.upto) return f; }
  return TIER_FAMILIES[TIER_FAMILIES.length-1];
}
function tierFamilyStart(shape){
  let prevUpto = -1;
  for(const f of TIER_FAMILIES){
    if(f.shape === shape) return prevUpto+1;
    prevUpto = f.upto;
  }
  return 0;
}
const TIER_GLYPHS = {
  circle:   '<circle cx="0" cy="0" r="8" fill="#0A0A0C"/>',
  square:   '<rect x="-7" y="-7" width="14" height="14" fill="#0A0A0C"/>',
  pentagon: '<polygon points="0,-9 8,-3 5,8 -5,8 -8,-3" fill="#0A0A0C"/>',
  diamond:  '<polygon points="0,-10 8,0 0,10 -8,0" fill="#0A0A0C"/>',
  star:     '<polygon points="0,-10 2.4,-3 9.5,-3 3.8,1.5 5.9,9 0,4.5 -5.9,9 -3.8,1.5 -9.5,-3 -2.4,-3" fill="#0A0A0C"/>'
};
function tierIconSVG(tier, size){
  size = size || 34;
  const fam = tierFamilyOf(tier.index);
  const start = tierFamilyStart(fam.shape);
  const sub = tier.index - start + 1;
  let ticks = '';
  for(let i=0;i<sub;i++){
    const x = -((sub-1)*5)/2 + i*5;
    ticks += `<rect x="${x-1.5}" y="12" width="3" height="4" fill="#0A0A0C"/>`;
  }
  return `<svg viewBox="-16 -16 32 32" width="${size}" height="${size}">${TIER_GLYPHS[fam.shape]}${ticks}</svg>`;
}

function tierBadgeHTML(tier){
  return `<div class="badge" style="background:${tier.color}">${tierIconSVG(tier, 34)}</div>`;
}

        <div>
          <h1>BRCSGO</h1>
          <p>Painel de Partidas &amp; Ranking</p>
        </div>
      </div>
      <div class="header-controls">

      <button class="tab-btn ${activeTab==='perfil'?'active':''}" data-tab="perfil">${ICONS.perfil}Meu Perfil</button>
      <button class="tab-btn ${activeTab==='historico'?'active':''}" data-tab="historico">${ICONS.historico}Histórico</button>

      <div class="mode-chips">

  });
  document.querySelectorAll('.mode-chip').forEach(chip => {
    chip.addEventListener('click', () => { viewMode = chip.dataset.mode; render(); });
  });

function renderTab(){
  if(activeTab === 'moderacao' && (!userProfile || userProfile.role !== 'moderator')) activeTab = 'ranking';
  const el = document.getElementById('tabContent');
  if(activeTab === 'registrar') el.innerHTML = registrarHTML();
  else if(activeTab === 'perfil') el.innerHTML = perfilHTML();
  else if(activeTab === 'historico') el.innerHTML = historicoHTML();
  else if(activeTab === 'ranking') el.innerHTML = rankingHTML();
  else if(activeTab === 'moderacao') el.innerHTML = moderacaoHTML();
  attachTabEvents();

  requestAnimationFrame(() => {
    document.querySelectorAll('.progress-fill').forEach(bar => {
      const target = bar.dataset.target;
      if(target !== undefined) bar.style.width = target + '%';
    });
  });

  if(activeTab === 'moderacao'){
    loadProofImages(matches.filter(m => m.status === 'pendente'));
  }
  if(activeTab === 'registrar'){
    const modeSelect = document.getElementById('f_mode');
    if(modeSelect) updateFormForMode(modeSelect.value);
  }
}

function updateFormForMode(modeKey){
  const cfg = MODES[modeKey];
  document.querySelectorAll('#matchForm [data-field]').forEach(w => {
    const f = w.dataset.field;
    const show = f === 'resultado' ? cfg.hasResultado : cfg.fields.includes(f);
    w.style.display = show ? '' : 'none';
  });
}

function perfilHTML(){
  const p = players.find(p => p.id === currentPlayerId);
  if(!p) return `<div class="panel accent-muted"><p class="empty-note">Selecione ou crie um jogador acima para ver o perfil.</p></div>`;
  const cfg = MODES[viewMode];
  const s = computeModeStats(p.id, viewMode);
  const pendingOwn = matches.filter(m => m.playerId === p.id && m.status === 'pendente' && (m.mode||'competitivo') === viewMode).length;

  let rankBlock = '';
  if(cfg.hasPatente){
    if(s.calibrating){
      let dots = '';
      for(let i=0;i<10;i++) dots += `<div class="calib-dot ${i < s.total ? 'filled' : ''}"></div>`;
      rankBlock = `
        <div class="rank-row">
          <div class="badge" style="background:var(--panel2); border:1px dashed var(--line); color:var(--muted);">?</div>
          <div class="rank-info">
            <div class="rank-name">Em calibragem — MD10</div>
            <div class="elo">${s.total} de 10 partidas aprovadas</div>
            <div class="calib-dots">${dots}</div>
          </div>
        </div>`;
    } else {
      const tier = getTier(s.elo);
      const next = TIERS[tier.index+1];
      const pct = next ? Math.min(100, ((s.elo - tier.min) / (next.min - tier.min)) * 100) : 100;
      rankBlock = `
        <div class="rank-row">
          ${tierBadgeHTML(tier)}
          <div class="rank-info">
            <div class="rank-name">${tier.name}</div>
            <div class="elo mono">${s.elo} ELO</div>
            <div class="progress-bar"><div class="progress-fill" data-target="${pct}"></div></div>
            <div class="progress-label">${next ? `${Math.round(pct)}% até ${next.name}` : 'Patente máxima alcançada'}</div>
          </div>
        </div>`;
    }
  } else if(cfg.rankBy){
    const ranking = getModeRanking(viewMode);
    const pos = ranking.findIndex(r => r.p.id === p.id);
    rankBlock = `
      <div class="helper-note">
        ${MODES[viewMode].label} não possui patente. ${pos >= 0 ? `Você está em <b>${pos+1}º lugar</b> no ranking (${cfg.rankBy === 'winRate' ? 'por taxa de vitória' : 'por kills'}).` : 'Registre partidas aprovadas neste modo para entrar no ranking.'}
      </div>`;
  } else {
    rankBlock = `<div class="helper-note">${MODES[viewMode].label} é só para diversão — sem ranking oficial.</div>`;
  }

  const cards = [];
  cards.push(`<div class="stat-card"><div class="val">${s.total}</div><div class="lbl">Partidas</div></div>`);
  if(cfg.hasResultado){
    cards.push(`<div class="stat-card"><div class="val win">${s.wins}</div><div class="lbl">Vitórias</div></div>`);
    cards.push(`<div class="stat-card"><div class="val loss">${s.losses}</div><div class="lbl">Derrotas</div></div>`);
    cards.push(`<div class="stat-card"><div class="val">${s.winRate.toFixed(0)}%</div><div class="lbl">Taxa Vitória</div></div>`);
  }
  cards.push(`<div class="stat-card"><div class="val">${s.kd.toFixed(2)}</div><div class="lbl">K/D</div></div>`);
  cards.push(`<div class="stat-card"><div class="val">${s.kills}</div><div class="lbl">Kills Totais</div></div>`);
  cards.push(`<div class="stat-card"><div class="val">${s.pontos}</div><div class="lbl">Pontos Totais</div></div>`);
  if(cfg.fields.includes('mvps')) cards.push(`<div class="stat-card"><div class="val">${s.mvps}</div><div class="lbl">MVPs</div></div>`);

  return `
    <div class="panel accent-blue">
      <h2>Meu Perfil <span class="sub">${p.name} · ${MODES[viewMode].label}</span></h2>
      ${rankBlock}
      ${pendingOwn > 0 ? `<div class="helper-note">Você tem ${pendingOwn} partida(s) de ${MODES[viewMode].label} aguardando aprovação.</div>` : ''}
      <div class="stat-cards">${cards.join('')}</div>
    </div>
  `;
}

function historicoHTML(){
  const p = players.find(p => p.id === currentPlayerId);
  if(!p) return `<div class="panel accent-muted"><p class="empty-note">Selecione um jogador para ver o histórico.</p></div>`;
  const cfg = MODES[viewMode];
  const s = computeModeStats(p.id, viewMode);
  const all = matches.filter(m => m.playerId === p.id && (m.mode||'competitivo') === viewMode).sort((a,b) => b.createdAt - a.createdAt);
  if(all.length === 0) return `<div class="panel accent-muted"><h2>Histórico <span class="sub">${p.name} · ${cfg.label}</span></h2><p class="empty-note">Nenhuma partida registrada neste modo ainda.</p></div>`;

  const rows = all.map(m => {
    const approved = s.historyMap[m.id];
    const deltaCell = cfg.hasPatente
      ? (approved ? `<span class="${approved.eloDelta>=0?'win':'loss'}">${approved.eloDelta>=0?'+':''}${approved.eloDelta}</span>` : `<span class="status-badge status-${m.status}">${m.status}</span>`)
      : `<span class="status-badge status-${m.status}">${m.status}</span>`;
    return `
      <tr>
        <td>${m.date}</td>
        <td>${m.map}</td>
        ${cfg.hasResultado ? `<td class="${m.result==='vitoria'?'win':m.result==='derrota'?'loss':'draw'}">${m.result==='vitoria'?'Vitória':m.result==='derrota'?'Derrota':'Empate'}</td>` : ''}
        <td>${m.kills}/${m.deaths}${cfg.fields.includes('assists') ? '/'+(m.assists||0) : ''}</td>
        <td>${m.pontos||0}</td>
        ${cfg.fields.includes('mvps') ? `<td class="stars">${starString(m.mvps||0)}</td>` : ''}
        <td>${deltaCell}${m.correctedByAI ? '<span class="ai-tag">🤖 ajustado</span>' : ''}</td>
      </tr>
    `;
  }).join('');

  return `
    <div class="panel accent-muted">
      <h2>Histórico <span class="sub">${p.name} · ${cfg.label}</span></h2>
      <table>
        <thead><tr>
          <th>Data</th><th>Mapa</th>
          ${cfg.hasResultado ? '<th>Resultado</th>' : ''}
          <th>K/D${cfg.fields.includes('assists')?'/A':''}</th><th>Pontos</th>
          ${cfg.fields.includes('mvps') ? '<th>MVPs</th>' : ''}
          <th>Status / Δ Elo</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function rankingHTML(){
  const cfg = MODES[viewMode];
  const approvedCount = matches.filter(m => m.status === 'aprovada' && (m.mode||'competitivo') === viewMode).length;
  const pendingCount = matches.filter(m => m.status === 'pendente' && (m.mode||'competitivo') === viewMode).length;

  if(!cfg.rankBy){
    return `<div class="panel"><h2>Ranking <span class="sub">${cfg.label}</span></h2><p class="empty-note">${cfg.label} é um modo livre, sem ranking oficial — as partidas ficam registradas só no histórico de cada jogador.</p></div>`;
  }

  const ranked = getModeRanking(viewMode);
  const leader = ranked[0];

  const hero = `
    <div class="hero-stats">
      <div class="hero-card"><div class="val">${ranked.length}</div><div class="lbl">Jogadores Ranqueados</div></div>
      <div class="hero-card"><div class="val">${approvedCount}</div><div class="lbl">Partidas Aprovadas</div></div>
      <div class="hero-card"><div class="val">${pendingCount}</div><div class="lbl">Em Análise</div></div>
      <div class="hero-card"><div class="val" style="font-size:16px;">${leader ? leader.p.name : '—'}</div><div class="lbl">Líder Atual</div></div>
    </div>
  `;

  if(ranked.length === 0) return `<div class="panel"><h2>Ranking <span class="sub">${cfg.label}</span></h2>${hero}<p class="empty-note">Nenhum jogador com partidas aprovadas neste modo ainda.</p></div>`;

  const rows = ranked.map((r, i) => {
    let metricCols;
    if(cfg.rankBy === 'elo'){
      const badge = r.s.calibrating
        ? `<span class="mini-badge" style="background:var(--panel2); color:var(--muted); border:1px dashed var(--line);">?</span>`
        : (() => { const t = getTier(r.s.elo); return `<span class="mini-badge" style="background:${t.color}">${tierIconSVG(t, 20)}</span>`; })();
      const tierName = r.s.calibrating ? `Calibrando (${r.s.total}/10)` : getTier(r.s.elo).name;
      metricCols = `<td class="name-cell">${badge}${r.p.name}</td><td>${tierName}</td><td>${r.s.elo}</td><td>${r.s.total}</td><td>${r.s.winRate.toFixed(0)}%</td>`;
    } else if(cfg.rankBy === 'winRate'){
      metricCols = `<td class="name-cell">${r.p.name}</td><td>${r.s.winRate.toFixed(0)}%</td><td>${r.s.total}</td><td>${r.s.kills}</td><td>${r.s.pontos}</td>`;
    } else {
      metricCols = `<td class="name-cell">${r.p.name}</td><td>${r.s.kills}</td><td>${r.s.total}</td><td>${r.s.kd.toFixed(2)}</td><td>${r.s.pontos}</td>`;
    }
    return `<tr><td class="pos">${i+1}</td>${metricCols}</tr>`;
  }).join('');

  let headCols;
  if(cfg.rankBy === 'elo') headCols = '<th>Jogador</th><th>Patente</th><th>Elo</th><th>Partidas</th><th>Vitória %</th>';
  else if(cfg.rankBy === 'winRate') headCols = '<th>Jogador</th><th>Vitória %</th><th>Partidas</th><th>Kills</th><th>Pontos</th>';
  else headCols = '<th>Jogador</th><th>Kills Totais</th><th>Partidas</th><th>K/D</th><th>Pontos</th>';

  return `
    <div class="panel">
      <h2>Ranking <span class="sub">${cfg.label} · Comunidade BRCSGO</span></h2>
      ${hero}
      <table>
        <thead><tr><th>#</th>${headCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function moderacaoHTML(){
  if(!userProfile || userProfile.role !== 'moderator'){
    return `<div class="panel accent-red"><h2>Moderação</h2><p class="empty-note">Acesso restrito à equipe do BRCSGO.</p></div>`;
  }
  const pending = matches.filter(m => m.status === 'pendente').sort((a,b) => a.createdAt - b.createdAt);
  if(pending.length === 0) return `<div class="panel accent-red"><h2>Moderação</h2><p class="empty-note">Nenhuma partida aguardando análise.</p></div>`;

  const cards = pending.map(m => {
    const player = players.find(p => p.id === m.playerId);
    const flags = flagsFor(m);
    const cfg = MODES[m.mode || 'competitivo'];
    return `
      <div class="mod-card">
        <img class="mod-proof" id="proof-${m.id}" alt="print do placar">
        <div class="mod-body">
          <div class="name-cell">${player ? player.name : '—'} <span class="mode-tag">${cfg.label}</span> <span class="mono" style="color:var(--muted); font-weight:400;">· ${m.map} · ${m.date}</span></div>
          <div style="margin-top:4px;">
            ${cfg.hasResultado ? `Resultado: <b class="${m.result==='vitoria'?'win':m.result==='derrota'?'loss':'draw'}">${m.result}</b> — ` : ''}
            K/D${cfg.fields.includes('assists')?'/A':''} ${m.kills}/${m.deaths}${cfg.fields.includes('assists') ? '/'+(m.assists||0) : ''} — Pontos ${m.pontos||0}${cfg.fields.includes('mvps') ? ' — MVPs '+(m.mvps||0) : ''}
          </div>
          ${m.aiNote ? `<div class="mod-ai">🤖 ${m.aiNote}</div>` : ''}
          ${flags.length ? `<div class="mod-flags">⚠ ${flags.join(' · ')}</div>` : ''}
        </div>
        <div class="mod-actions">
          <button class="ok small" data-approve="${m.id}">Aprovar</button>
          <button class="danger small" data-reject="${m.id}">Rejeitar</button>
          <a class="download-link" id="dl-${m.id}" href="#" download="brcsgo-print-${m.id}.jpg">Baixar imagem</a>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="panel accent-red">
      <h2>Moderação <span class="sub">${pending.length} partida(s) aguardando análise</span></h2>
      ${cards}
    </div>
  `;
}

async function loadProofImages(list){
  for(const m of list){
    const img = document.getElementById('proof-' + m.id);
    const dl = document.getElementById('dl-' + m.id);
    if(!img) continue;
    try{
      const val = await getDoc('brcsgo:proof:' + m.id);
      if(val){ img.src = val; if(dl) dl.href = val; }
    }catch(e){ /* sem imagem disponível */ }
  }
}

function attachTabEvents(){
  const modeSelect = document.getElementById('f_mode');
  if(modeSelect){
    modeSelect.addEventListener('change', () => updateFormForMode(modeSelect.value));
  }

  attachModAndActionEvents();

  const form = document.getElementById('matchForm');
  if(form){
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = userProfile.playerName;
      const file = document.getElementById('f_proof').files[0];
      if(!file){ alert('Anexe um print do placar final da partida.'); return; }

      const modeKey = document.getElementById('f_mode').value;
      const cfg = MODES[modeKey];
      const kills = parseInt(document.getElementById('f_kills').value) || 0;
      const deaths = parseInt(document.getElementById('f_deaths').value) || 0;
      const assists = cfg.fields.includes('assists') ? (parseInt(document.getElementById('f_assists').value) || 0) : 0;
      const pontos = cfg.fields.includes('pontos') ? (parseInt(document.getElementById('f_pontos').value) || 0) : 0;
      const mvps = cfg.fields.includes('mvps') ? (parseInt(document.getElementById('f_mvps').value) || 0) : 0;
      const result = cfg.hasResultado ? document.getElementById('f_result').value : null;

      const match = {
        id: 'm_' + Date.now() + '_' + Math.floor(Math.random()*1000),
        playerId: currentPlayerId,
        mode: modeKey,
        date: document.getElementById('f_date').value,
        map: document.getElementById('f_map').value,
        result, kills, deaths, assists, pontos, mvps,
        status: 'pendente',
        correctedByAI: false,
        aiNote: '',
        createdAt: Date.now()
      };

      // Salva e libera o jogador NA HORA — a verificação por IA roda depois, em segundo plano
      matches.push(match);
      await saveShared('brcsgo:matches', matches);
      viewMode = modeKey;
      lastUsedMode = modeKey;
      lastUsedMap = match.map;
      await saveLocal('brcsgo:lastMode', modeKey);
      await saveLocal('brcsgo:lastMap', match.map);

      showToast('Partida enviada! Verificando em segundo plano...');
      activeTab = 'perfil';
      render();

      verifyMatchInBackground(match.id, name, modeKey, file);
    });
  }
}

async function verifyMatchInBackground(matchId, playerName, modeKey, file){
  const cfg = MODES[modeKey];
  let proofData = null;
  try{ proofData = await compressImage(file); }catch(err){ console.error(err); }
  if(proofData){
    try{ await setDoc('brcsgo:proof:' + matchId, proofData); }catch(err){}
  }
  if(!proofData) { renderTab(); return; }

  const ai = await analyzeProof(proofData, playerName, modeKey);

  // recarrega o estado mais recente do banco, pra não sobrescrever uma decisão
  // que um moderador já possa ter tomado manualmente enquanto a IA processava
  const freshMatches = await loadShared('brcsgo:matches');
  const idx = freshMatches.findIndex(m => m.id === matchId);
  if(idx === -1) return;
  const match = freshMatches[idx];
  if(match.status !== 'pendente') return;

  if(!ai || ai.legivel === false){
    match.aiNote = 'A IA não conseguiu confirmar os dados no print — revisão manual necessária.' + (ai && ai.observacao ? ' (' + ai.observacao + ')' : '');
  } else {
    const diffs = [];
    ['kills','deaths','assists','pontos','mvps'].forEach(f => {
      if(!cfg.fields.includes(f)) return;
      if(ai[f] !== null && ai[f] !== undefined && Number(ai[f]) !== match[f]){
        diffs.push({field:f, from:match[f], to:Number(ai[f])});
      }
    });
    if(cfg.hasResultado && ai.resultado){
      const aiResult = normalizeResultado(ai.resultado);
      if(aiResult && aiResult !== match.result) diffs.push({field:'result', from:match.result, to:aiResult});
    }
    if(ai.mapa){
      const aiMap = matchMap(ai.mapa);
      if(aiMap && aiMap !== match.map) diffs.push({field:'map', from:match.map, to:aiMap});
    }
    let modeWarning = '';
    if(ai.modo){
      const aiMode = matchMode(ai.modo);
      if(aiMode && aiMode !== modeKey){
        modeWarning = 'O print parece ser de ' + MODES[aiMode].label + ', mas a partida foi registrada como ' + MODES[modeKey].label + ' — confira antes de aprovar.';
      }
    }

    if(diffs.length === 0 && !modeWarning){
      match.status = 'aprovada';
      match.aiNote = 'IA confirmou todas as estatísticas do print.';
      deleteDoc('brcsgo:proof:' + matchId);
    } else {
      diffs.forEach(d => { match[d.field] = d.to; });
      match.correctedByAI = diffs.length > 0;
      const notes = [];
      if(diffs.length) notes.push('IA ajustou valores divergentes do print: ' + diffs.map(d => FIELD_LABELS[d.field] + ' ' + d.from + ' → ' + d.to).join(', '));
      if(modeWarning) notes.push('⚠ ' + modeWarning);
      match.aiNote = notes.join(' ');
    }
  }

  freshMatches[idx] = match;
  await saveShared('brcsgo:matches', freshMatches);
  matches = freshMatches;
  renderTab();
}

function attachModAndActionEvents(){
  document.querySelectorAll('[data-approve]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.approve;
      const m = matches.find(m => m.id === id);
      if(m) m.status = 'aprovada';
      await saveShared('brcsgo:matches', matches);
      deleteDoc('brcsgo:proof:' + id);
      renderTab();
    });
  });
  document.querySelectorAll('[data-reject]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!confirm('Rejeitar esta partida?')) return;
      const id = btn.dataset.reject;
      const m = matches.find(m => m.id === id);
      if(m) m.status = 'rejeitada';
      await saveShared('brcsgo:matches', matches);
      deleteDoc('brcsgo:proof:' + id);
      renderTab();
    });
  });
}

async function init(){
  if(!db){
    storageAvailable = false;
  }
  let auth = null;
  try{ if(typeof firebase !== 'undefined') auth = firebase.auth(); }catch(e){}
  if(!auth){
    document.getElementById('app').innerHTML = '<div class="storage-warning">⚠ O sistema de login (Firebase Authentication) não pôde ser iniciado. Confira se ele está ativado no seu projeto Firebase (Build → Authentication → Sign-in method → Email/Senha).</div>';
    return;
  }

  const lastMode = await loadLocal('brcsgo:lastMode');
  if(lastMode && MODES[lastMode]) lastUsedMode = lastMode;
  const lastMap = await loadLocal('brcsgo:lastMap');
  if(lastMap && MAPS.includes(lastMap)) lastUsedMap = lastMap;

  auth.onAuthStateChanged(async (user) => {
    if(!user){
      authUser = null;
      userProfile = null;
      renderAuthGate();
      return;
    }
    authUser = user;
    players = await loadShared('brcsgo:players');
    matches = await loadShared('brcsgo:matches');
    users = await loadShared('brcsgo:users');
    matches.forEach(m => {
      if(!m.status) m.status = 'aprovada';
      if(!m.mode) m.mode = 'competitivo';
      if(m.pontos === undefined) m.pontos = (m.kills||0) * 2;
    });
    userProfile = users.find(u => u.uid === user.uid) || null;
    if(!userProfile){
      // conta existe na autenticação mas ainda não tem perfil salvo — cria um básico
      const fallbackName = (user.email || 'Jogador').split('@')[0];
      userProfile = {uid: user.uid, playerName: fallbackName, role: 'member'};
      users.push(userProfile);
      await saveShared('brcsgo:users', users);
      players.push({id: user.uid, name: fallbackName, ownerUid: user.uid});
      await saveShared('brcsgo:players', players);
    }
    currentPlayerId = user.uid;
    if(activeTab === 'moderacao' && userProfile.role !== 'moderator') activeTab = 'ranking';
    render();
  });
}

init();
</script>
